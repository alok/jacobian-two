name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lean:
    name: Lean certificate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: leanprover/lean-action@v1
        with:
          build: true
          build-args: --wfail
      - name: Reject unfinished or custom-axiom proofs
        run: |
          if rg -n '\b(sorry|admit|axiom)\b' JacobianTwo.lean JacobianTwo -g '*.lean'; then
            exit 1
          fi

  python:
    name: Independent exact checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Run exact verification
        run: uv run --frozen python -m scripts.verify
      - name: Check cubic fibers and the nonproper-set algebra
        run: uv run --frozen python -m scripts.nonproper
      - name: Check the arbitrary-degree affine-coordinate normal forms
        run: uv run --frozen python -m scripts.affine_coordinate
      - name: Check the constant-leading quadratic-coordinate normal forms
        run: uv run --frozen python -m scripts.constant_leading_quadratic
      - name: Check the variable-leading quadratic hostile fixtures
        run: uv run --frozen python -m scripts.variable_leading_quadratic --depth 9
      - name: Check the exact six-sheet monodromy certificate
        run: uv run --frozen python -m scripts.six_sheet_monodromy
      - name: Check the residual Newton-polygon sparse-support certificates
        run: uv run --frozen python -m scripts.newton_72_108
      - name: Run adversarial tests
        run: uv run --frozen pytest
      - name: Check Python types
        run: uv run --frozen mypy
