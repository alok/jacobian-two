name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lean:
    name: Lean certificate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: leanprover/lean-action@v1
        with:
          build: true
          build-args: --wfail
      - name: Reject unfinished or custom-axiom proofs
        run: |
          if rg -n '\b(sorry|admit|axiom)\b' JacobianTwo.lean JacobianTwo -g '*.lean'; then
            exit 1
          fi

  python:
    name: Independent exact checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Run exact verification
        run: uv run --frozen python -m scripts.verify
      - name: Check cubic fibers and the nonproper-set algebra
        run: uv run --frozen python -m scripts.nonproper
      - name: Check the arbitrary-degree affine-coordinate normal forms
        run: uv run --frozen python -m scripts.affine_coordinate
      - name: Check the constant-leading quadratic-coordinate normal forms
        run: uv run --frozen python -m scripts.constant_leading_quadratic
      - name: Check the variable-leading quadratic hostile fixtures
        run: uv run --frozen python -m scripts.variable_leading_quadratic --depth 9
      - name: Check the exact six-sheet monodromy certificate
        run: uv run --frozen python -m scripts.six_sheet_monodromy
      - name: Check the hostile canonical and determinant graph family
        run: uv run --frozen python -m scripts.canonical_leaf_graph
      - name: Check Orevkov's hostile degree-five cusp germ
        run: uv run --frozen python -m scripts.a6_cusp_germ
      - name: Check the conditional two-pair splice obstruction
        run: uv run --frozen python -m scripts.two_pair_infinity
      - name: Check split boundary determinant transport
        run: uv run --frozen python -m scripts.split_boundary_transport
      - name: Check the finite S6 split-boundary cover
        run: uv run --frozen python -m scripts.s6_split_cover
      - name: Check the hostile trace-lattice matrices
        run: uv run --frozen python -m scripts.trace_hostile_matrices
      - name: Exclude the hostile S6 trace curve topologically
        run: uv run --frozen python -m scripts.s6_trace_curve_topology
      - name: Exclude the smallest width-five S6 near-miss
        run: uv run --frozen python -m scripts.s6_width_five_curve
      - name: Check the S6 one-pair infinity-group frontier
        run: uv run --frozen python -m scripts.s6_one_pair_infinity
      - name: Check the conditional A6 one-pair infinity obstruction
        run: uv run --frozen python -m scripts.a6_one_pair_infinity
      - name: Reduce the conditional A6 delta-five family
        run: uv run --frozen python -m scripts.a6_delta_five_family
      - name: Exhaust the conditional A6 delta-five residual
        run: uv run --frozen python -m scripts.a6_delta_five_residual
      - name: Exclude the generic conditional A6 delta-seven stratum
        run: uv run --frozen python -m scripts.a6_delta_seven_generic
      - name: Exclude the conditional A6 delta-seven triple wall
        run: uv run --frozen python -m scripts.a6_delta_seven_triple_wall
      - name: Exclude the first conditional A6 delta-seven collision strata
        run: uv run --frozen python -m scripts.a6_delta_seven_discriminant_wall
      - name: Exclude the one-dimensional conditional A6 delta-seven walls
        run: uv run --frozen python -m scripts.a6_delta_seven_deeper_wall
      - name: Check the finite conditional A6 delta-seven endpoints
        run: uv run --frozen python -m scripts.a6_delta_seven_finite_wall
      - name: Check the conditional A6 frontier through delta ten
        run: uv run --frozen python -m scripts.a6_post_delta_seven_frontier
      - name: Exclude the generic conditional A6 delta-ten stratum
        run: uv run --frozen python -m scripts.a6_delta_ten_generic
      - name: Audit the surviving A6 delta-ten link data
        run: uv run --frozen python -m scripts.a6_delta_ten_link_compatibility
      - name: Exclude an exact conditional A6 delta-ten contact-wall member
        run: uv run --frozen python -m scripts.a6_delta_ten_contact_wall
      - name: Exclude an exact conditional A6 delta-ten triple-wall member
        run: uv run --frozen python -m scripts.a6_delta_ten_triple_wall
      - name: Check the two dominant conditional A6 delta-ten wall components
        run: uv run --frozen python -m scripts.a6_delta_ten_wall_components
      - name: Enumerate the conditional A6 delta-ten collision ledger
        run: uv run --frozen python -m scripts.a6_delta_ten_partition_ledger
      - name: Exclude the conditional A6 delta-ten ordinary-quadruple stratum
        run: uv run --frozen python -m scripts.a6_delta_ten_quadruple
      - name: Check the hostile A6 local multiplication fixtures
        run: uv run --frozen python -m scripts.a6_local_multiplication
      - name: Check the hostile 2.A6 spin lifts
        run: uv run --frozen python -m scripts.a6_spin_lift
      - name: Check the residual Newton-polygon sparse-support certificates
        run: uv run --frozen python -m scripts.newton_72_108
      - name: Run adversarial tests
        run: uv run --frozen pytest
      - name: Check Python types
        run: uv run --frozen mypy
